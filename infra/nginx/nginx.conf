# ============================================
# NGINX Configuration - Multi-Application Setup
# Applications: Renter (/) + Company (/company/)
# Deployment: Blue-Green with Static File Serving
# ============================================

# HTTP -> HTTPS лҰ¬лӢӨмқҙл үнҠё
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS л©”мқё м„ңлІ„
server {
    listen 443 ssl http2;
    server_name _;
    client_max_body_size 50m;

    # ============================================
    # SSL/TLS м„Өм •
    # ============================================
    ssl_certificate /etc/letsencrypt/live/j14e201.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14e201.p.ssafy.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ============================================
    # 1. Renter App (/)
    # Blue-Green: __RENTER_ROOT__ вҶ’ /usr/share/nginx/html/renter-blue or renter-green
    # ============================================
    location / {
        root __RENTER_ROOT__;
        index index.html;
        # SPA routing: мЎҙмһ¬н•ҳм§Җ м•ҠлҠ” кІҪлЎңлҠ” index.htmlлЎң (React Router мІҳлҰ¬)
        # =404: index.html м—Ҷмқ„ л•Ң л¬ҙн•ң лЈЁн”„ л°©м§Җ
        try_files $uri $uri/ /index.html =404;

        # мәҗмӢң м„Өм • (HTMLлҠ” мәҗмӢңн•ҳм§Җ м•ҠмқҢ, м •м Ғ мһҗмӮ°мқҖ мәҗмӢң)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # 2. Company App (/company/)
    # Blue-Green: __COMPANY_ROOT__ вҶ’ /usr/share/nginx/html/company-blue or company-green
    # Vite base: '/company/' кіј мқјм№ҳ
    # ============================================
    location /company/ {
        alias __COMPANY_ROOT__/;
        index index.html;
        # SPA routing: alias мӮ¬мҡ© мӢң =404 м ңкұ°н•ҙм•ј лӮҙл¶Җ лҰ¬лӢӨмқҙл үнҠё м •мғҒ лҸҷмһ‘
        try_files $uri $uri/ /company/index.html;

        # мәҗмӢң м„Өм •
        location ~* /company/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # 3. Backend API (/api)
    # Proxy to Spring Boot Backend
    # Blue-Green: __BACKEND_HOST__ вҶ’ backend-blue or backend-green
    # SSE (Server-Sent Events) мөңм Ғнҷ” м„Өм •
    # ============================================
    location /api {
        proxy_pass http://__BACKEND_HOST__:8080;

        # кё°ліё н”„лЎқмӢң н—ӨлҚ”
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;

        # SSE (Server-Sent Events) м„Өм •
        # вҶ’ мқ‘лӢөмқ„ лІ„нҚјл§Ғн•ҳм§Җ м•Ҡкі  мҰүмӢң нҒҙлқјмқҙм–ёнҠём—җ м „лӢ¬
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;  # 24мӢңк°„ (м—°кІ° мң м§Җ)
    }

    # Docker лӮҙл¶Җ DNS - м»Ён…Ңмқҙл„Ҳ мқҙлҰ„ мЎ°нҡҢлҘј мҡ”мІӯ мӢңм җмңјлЎң м§Җм—° (м»Ён…Ңмқҙл„Ҳ лҜёмӢӨн–ү мӢң nginx мӢңмһ‘ мӢӨнҢЁ л°©м§Җ)
    resolver 127.0.0.11 valid=30s;

    # ============================================
    # 4. AI - Verify Swagger UI (н…ҢмҠӨнҠёмҡ©)
    # https://j14e201.p.ssafy.io/ai/docs
    # ============================================
    location /ai/docs {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/docs/ {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/openapi.json {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 5. AI - Verify (Face + Scratch Compare) (ai-verify:8001)
    # ============================================
    location /ai/api/v1/face/ {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/api/v1/face/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ai/api/v1/scratches/compare {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/api/v1/scratches/compare;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============================================
    # 6. AI - YOLO WebSocket (__AI_YOLO_URL__)
    # ============================================
    location /ai/api/v1/scratches/ws/ {
        proxy_pass __AI_YOLO_URL__/api/v1/scratches/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_ssl_server_name on;
    }

    # ============================================
    # 7. AI - YOLO REST (RunPod: __AI_YOLO_URL__)
    # ============================================
    location /ai/api/v1/scratches/ {
        proxy_pass __AI_YOLO_URL__/api/v1/scratches/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ============================================
    # 8. Jenkins
    # ============================================
    location /jenkins/ {
        proxy_pass http://jenkins:8080/jenkins/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_request_buffering off;
    }

    # ============================================
    # 9. н—¬мҠӨ мІҙнҒ¬ (лЎңл“ңл°ёлҹ°м„ңмҡ©)
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
