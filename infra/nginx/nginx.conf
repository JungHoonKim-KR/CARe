# ============================================
# NGINX Configuration - Multi-Application Setup
# Applications: Renter (/) + Company (/company/)
# Deployment: Blue-Green with Static File Serving
# ============================================

# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS 메인 서버
server {
    listen 443 ssl http2;
    server_name _;
    client_max_body_size 50m;

    # ============================================
    # SSL/TLS 설정
    # ============================================
    ssl_certificate /etc/letsencrypt/live/j14e201.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14e201.p.ssafy.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ============================================
    # 1. Renter App (/)
    # Blue-Green: __RENTER_ROOT__ → /usr/share/nginx/html/renter-blue or renter-green
    # ============================================
    location / {
        root __RENTER_ROOT__;
        index index.html;
        # SPA routing: 존재하지 않는 경로는 index.html로 (React Router 처리)
        # =404: index.html 없을 때 무한 루프 방지
        try_files $uri $uri/ /index.html =404;

        # 캐시 설정 (HTML는 캐시하지 않음, 정적 자산은 캐시)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # 2. Company App (/company/)
    # Blue-Green: __COMPANY_ROOT__ → /usr/share/nginx/html/company-blue or company-green
    # Vite base: '/company/' 과 일치
    # ============================================
    location /company/ {
        alias __COMPANY_ROOT__/;
        index index.html;
        # SPA routing: alias 사용 시 =404 제거해야 내부 리다이렉트 정상 동작
        try_files $uri $uri/ /company/index.html;

        # 캐시 설정
        location ~* /company/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # 3. Backend API (/api)
    # Proxy to Spring Boot Backend
    # Blue-Green: __BACKEND_HOST__ → backend-blue or backend-green
    # SSE (Server-Sent Events) 최적화 설정
    # ============================================
    location /api {
        proxy_pass http://__BACKEND_HOST__:8080;

        # 기본 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;

        # SSE (Server-Sent Events) 설정
        # → 응답을 버퍼링하지 않고 즉시 클라이언트에 전달
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;  # 24시간 (연결 유지)
    }

    # Docker 내부 DNS - 컨테이너 이름 조회를 요청 시점으로 지연 (컨테이너 미실행 시 nginx 시작 실패 방지)
    resolver 127.0.0.11 valid=30s;

    # ============================================
    # 4. AI - Verify Swagger UI (테스트용)
    # https://j14e201.p.ssafy.io/ai/docs
    # ============================================
    # trailing slash 없이 접근 시 /ai/docs/ 로 redirect (Starlette 307 우회)
    location = /ai/docs {
        return 302 /ai/docs/;
    }

    location /ai/docs/ {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect ~^http://ai-verify:8001/(.*)$ /ai/$1;
    }

    location /ai/openapi.json {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 4-1. Privy Server (지갑 생성)
    # ============================================
    location /privy {
        set $privy_server http://privy-server:3001;
        proxy_pass $privy_server;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============================================
    # 5. AI - Verify (Face + Scratch Compare) (ai-verify:8001)
    # ============================================
    location /ai/api/v1/face/ {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/api/v1/face/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ai/api/v1/scratches/compare {
        set $ai_verify http://ai-verify:8001;
        proxy_pass $ai_verify/api/v1/scratches/compare;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============================================
    # 6. AI - YOLO WebSocket (__AI_YOLO_URL__)
    # ============================================
    location /ai/api/v1/scratches/ws/ {
        proxy_pass __AI_YOLO_URL__/api/v1/scratches/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_read_timeout 3600s;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # ============================================
    # 7. AI - YOLO REST (RunPod: __AI_YOLO_URL__)
    # ============================================
    location /ai/api/v1/scratches/ {
        proxy_pass __AI_YOLO_URL__/api/v1/scratches/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # ============================================
    # 8. Jenkins
    # ============================================
    location /jenkins/ {
        proxy_pass http://jenkins:8080/jenkins/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_request_buffering off;
    }

    # ============================================
    # 9. 헬스 체크 (로드밸런서용)
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
